name: Fill History (Daily Auto + Manual Batch)

on:
  schedule:
    - cron: '0 20 * * *'  # 每天 UTC 20:00（北京时间 4:00）
  workflow_dispatch:
    inputs:
      start_date:
        description: '开始日期 (格式：YYYY-MM-DD)'
        required: true
        default: '2025-01-01'
      end_date:
        description: '结束日期 (格式：YYYY-MM-DD)'
        required: true
        default: '2026-03-05'
      daily_commits:
        description: '每天提交次数'
        required: true
        default: '12'

jobs:
  fill:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 必须有写入权限
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整历史，避免强制推送失败

      - name: Configure Git
        run: |
          git config --global user.email "3129613652@qq.com"  # 替换为你的 GitHub 邮箱
          git config --global user.name "WinnKind"             # 替换为你的 GitHub 用户名

      - name: Generate and push commits
        env:
          START_DATE: ${{ github.event.inputs.start_date }}
          END_DATE: ${{ github.event.inputs.end_date }}
          DAILY_COMMITS: ${{ github.event.inputs.daily_commits }}
        run: |
          # 调试：打印输入参数
          echo "Event name: ${{ github.event_name }}"
          echo "Start date: $START_DATE"
          echo "End date: $END_DATE"
          echo "Daily commits: $DAILY_COMMITS"

          if [ "${{ github.event_name }}" == "schedule" ]; then
            # 定时触发：生成今天的提交
            TODAY=$(date +%Y-%m-%d)
            echo "=== 定时任务：生成 $TODAY 的提交 ==="
            for i in $(seq 1 $DAILY_COMMITS); do
              git commit --allow-empty -m "daily fill #$i on $TODAY"
              echo "Created commit $i for $TODAY"
            done
            git push origin HEAD
          else
            # 手动触发：生成历史提交（修复日期循环逻辑）
            echo "=== 手动任务：生成从 $START_DATE 到 $END_DATE 的提交 ==="
            current="$START_DATE"
            end_ts=$(date -d "$END_DATE" +%s)  # 结束日期的时间戳

            while true; do
              current_ts=$(date -d "$current" +%s)
              # 如果当前日期 > 结束日期，退出循环
              if [ "$current_ts" -gt "$end_ts" ]; then
                break
              fi

              echo "Processing date: $current"
              # 生成当天的多次提交
              for i in $(seq 1 $DAILY_COMMITS); do
                export GIT_AUTHOR_DATE="$current 12:00:00"
                export GIT_COMMITTER_DATE="$current 12:00:00"
                git commit --allow-empty -m "chore: sync #$i on $current"
              done
              echo "Committed $DAILY_COMMITS times for $current"

              # 日期 +1 天
              current=$(date -d "$current + 1 day" +%Y-%m-%d)
            done

            echo "=== 强制推送提交到远程仓库 ==="
            git push --force origin HEAD
          fi
